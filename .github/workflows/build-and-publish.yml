name: Build and Publish

# Push a version tag (matching ModConfig.json's ModVersion, e.g. "0.1.0") to build a clean Reloaded
# package and attach it to a GitHub Release. Manual runs (workflow_dispatch) build without releasing.
on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DOTNET_ROLL_FORWARD: LatestMajor

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build & package (Reloaded Publisher)
        run: ./Publish.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffttic.katanareforged
          path: ./Publish/ToUpload/Generic/*

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ./Publish/ToUpload/Generic/*
          generate_release_notes: true
